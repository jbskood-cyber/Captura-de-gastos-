<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" />
  <!-- Truck symbol in elegant white line-art -->
  <g fill="none" stroke="#f8fafc" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" transform="translate(100, 120)">
    <!-- Cabin -->
    <path d="M 180 80 L 260 80 L 300 140 L 300 200 L 180 200 Z" />
    <!-- Cargo Box -->
    <rect x="0" y="20" width="160" height="180" rx="10" />
    <!-- Wheel arches -->
    <path d="M 30 200 A 30 30 0 0 1 90 200" />
    <path d="M 210 200 A 30 30 0 0 1 270 200" />
    <!-- Windshield -->
    <path d="M 240 100 L 280 140 L 240 140 Z" fill="#38bdf8" stroke="none" opacity="0.8" />
    <!-- Line accent below truck -->
    <path d="M -20 230 L 340 230" stroke="#38bdf8" stroke-width="12" />
  </g>
</svg>
