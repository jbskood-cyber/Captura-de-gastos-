services:
  - type: web
    name: kargo-family
    env: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /manifest.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_MODE
        value: family
      - key: GEMINI_API_KEY
        sync: false
      - key: KARGO_FAMILY_ACCESS_CODE
        sync: false
      - key: KARGO_BRIDGE_SECRET
        sync: false
      - key: KARGO_APPS_SCRIPT_URL
        sync: false
      - key: SPREADSHEET_ID
        value: 1sR2fTa2TQiIliqqdzwTNKZRnYUdIhYg4Jlyo8TiCkhc
      - key: DRIVE_FOLDER_ID
        value: 1Y2c0D1hvQ6t4pgbsVg88A6nNcBgP6NmA
